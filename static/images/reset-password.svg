<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" fill="none">
    <defs>
        <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22D3EE" />
            <stop offset="100%" stop-color="#0891B2" />
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <style>
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        .pulse-slow {
            animation: pulse 4s ease-in-out infinite;
        }
        .rotate-cw {
            transform-origin: 400px 400px;
            animation: rot-cw 40s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        @keyframes rot-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Grid Layout -->
    <g opacity="0.08">
        <circle cx="400" cy="400" r="320" stroke="#60A5FA" stroke-width="0.5" stroke-dasharray="10 10" />
        <path d="M 0 200 L 800 200 M 0 400 L 800 400 M 0 600 L 800 600" fill="none" stroke="#60A5FA" stroke-width="0.5" />
    </g>

    <circle class="pulse-slow" cx="400" cy="400" r="300" fill="url(#centerGlow)" />

    <g class="rotate-cw" opacity="0.3">
        <circle cx="400" cy="400" r="230" stroke="url(#primaryGrad)" stroke-width="1.5" stroke-dasharray="20 40" />
        <circle cx="400" cy="400" r="170" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-dasharray="150 50" />
    </g>

    <!-- Visual Credential Password Reset Shield -->
    <g class="float-slow">
        <!-- Shield Backdrop -->
        <path d="M 400,220 L 520,260 V 420 C 520,510 400,580 400,580 C 400,580 280,510 280,420 V 260 Z" 
              fill="#1E293B" stroke="url(#primaryGrad)" stroke-width="2" filter="url(#glow)" />
        
        <!-- Rotating Synced Keys loop -->
        <g transform="translate(400, 390)">
            <!-- Circular reload / reset vector -->
            <path d="M -50,0 A 50,50 0 1,1 0,50" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="60 20" />
            <path d="M 0,50 L -12,50 L -3,62 Z M -50,0 L -50,12 L -62,3 Z" fill="url(#cyanGrad)" />
            
            <!-- Padlock Core -->
            <rect x="-25" y="-20" width="50" height="40" rx="4" fill="url(#primaryGrad)" stroke="url(#cyanGrad)" stroke-width="1.5" />
            <path d="M -15,-20 V -32 C -15,-38 -10,-42 0,-42 C 10,-42 15,-38 15,-32 V -20" fill="none" stroke="url(#cyanGrad)" stroke-width="3.5" />
        </g>
    </g>
</svg>
