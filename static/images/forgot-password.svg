<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" fill="none">
    <defs>
        <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>
        <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F59E0B" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22D3EE" />
            <stop offset="100%" stop-color="#0891B2" />
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <style>
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        .pulse-slow {
            animation: pulse 4s ease-in-out infinite;
        }
        .rotate-cw {
            transform-origin: 400px 400px;
            animation: rot-cw 30s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        @keyframes rot-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Background Pattern -->
    <g opacity="0.08">
        <circle cx="400" cy="400" r="350" stroke="#60A5FA" stroke-width="0.5" stroke-dasharray="2 10" />
        <path d="M 100 0 L 100 800 M 300 0 L 300 800 M 500 0 L 500 800 M 700 0 L 700 800" fill="none" stroke="#60A5FA" stroke-width="0.5" />
    </g>

    <circle class="pulse-slow" cx="400" cy="400" r="300" fill="url(#centerGlow)" />

    <g class="rotate-cw" opacity="0.3">
        <circle cx="400" cy="400" r="240" stroke="url(#primaryGrad)" stroke-width="1.5" stroke-dasharray="10 30" />
        <circle cx="400" cy="400" r="180" stroke="url(#warningGrad)" stroke-width="1.5" stroke-dasharray="80 100" />
    </g>

    <!-- Key and Unlocking visual elements -->
    <g class="float-slow">
        <!-- Floating Padlock Base (Open state or recovery state) -->
        <rect x="330" y="380" width="140" height="110" rx="12" fill="#1E293B" stroke="url(#primaryGrad)" stroke-width="2.5" filter="url(#glow)" />
        
        <!-- Open Shackle path -->
        <path d="M 360,380 V 330 C 360,305 385,285 410,285 C 435,285 450,300 450,320 M 440,320" fill="none" stroke="url(#warningGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
        
        <!-- Key representation -->
        <g transform="translate(390, 420)">
            <circle cx="10" cy="10" r="20" fill="none" stroke="url(#cyanGrad)" stroke-width="3" />
            <line x1="26" y1="20" x2="65" y2="50" stroke="url(#cyanGrad)" stroke-width="4.5" stroke-linecap="round" />
            <line x1="50" y1="36" x2="58" y2="30" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round" />
            <line x1="58" y1="44" x2="66" y2="38" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round" />
        </g>
    </g>
</svg>
