<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>
    <!-- Glowing Blue Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring details -->
  <circle cx="50" cy="50" r="44" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4 2" />

  <!-- Shield Base shape -->
  <path d="M 50,15 C 65,15 76,20 76,20 C 76,46 65,65 50,75 C 35,65 24,46 24,20 C 24,20 35,15 50,15 Z" 
        fill="url(#logoGrad)" filter="url(#logoGlow)" />
        
  <path d="M 50,19 C 62,19 71,23 71,23 C 71,44 62,60 50,69 C 38,60 29,44 29,23 C 29,23 38,19 50,19 Z" 
        fill="#060913" />

  <!-- Core secure connection node -->
  <circle cx="50" cy="44" r="8" fill="#10b981" filter="url(#logoGlow)" />
  <circle cx="50" cy="44" r="3" fill="#fff" />
  
  <path d="M 50,52 L 50,60" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 44,57 L 56,57" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
</svg>