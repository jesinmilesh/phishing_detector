<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
        <!-- Background Gradients -->
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0a192f" stop-opacity="1" />
            <stop offset="60%" stop-color="#020813" stop-opacity="1" />
            <stop offset="100%" stop-color="#000000" stop-opacity="1" />
        </radialGradient>
        <radialGradient id="glowPulse" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0" />
        </radialGradient>

        <!-- Accent Gradients -->
        <linearGradient id="cyberBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d2ff" />
            <stop offset="50%" stop-color="#0066ff" />
            <stop offset="100%" stop-color="#7000ff" />
        </linearGradient>
        <linearGradient id="neonGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffcc" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
        <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0055ff" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.02" />
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowSubtle" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#007dff" stroke-width="1" stroke-opacity="0.07" />
        </pattern>
        <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#00ffcc" fill-opacity="0.1" />
        </pattern>
    </defs>

    <!-- Embedded CSS for subtle animations -->
    <style>
        .rotate-clockwise {
            transform-origin: 400px 400px;
            animation: rot-cw 40s linear infinite;
        }
        .rotate-counter {
            transform-origin: 400px 400px;
            animation: rot-ccw 30s linear infinite;
        }
        .pulse-slow {
            animation: pulse 4s ease-in-out infinite;
        }
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        .float-delay {
            animation: float 6s ease-in-out infinite;
            animation-delay: 3s;
        }
        .dash-move {
            stroke-dasharray: 8 16;
            animation: dash 20s linear infinite;
        }
        .circuit-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawCircuit 8s ease-in-out infinite alternate;
        }
        .circuit-delay {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawCircuit 8s ease-in-out infinite alternate;
            animation-delay: 4s;
        }

        @keyframes rot-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rot-ccw {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.25; transform: scale(0.98); transform-origin: 400px 400px; }
            50% { opacity: 0.55; transform: scale(1.02); transform-origin: 400px 400px; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes dash {
            to { stroke-dashoffset: -400; }
        }
        @keyframes drawCircuit {
            to { stroke-dashoffset: 0; }
        }
    </style>

    <!-- Background Base -->
    <rect width="800" height="800" fill="url(#bgGlow)" />
    
    <!-- Cyber Grid Layout -->
    <rect width="800" height="800" fill="url(#grid)" />
    <rect width="800" height="800" fill="url(#dots)" />

    <!-- Pulse Backing -->
    <circle class="pulse-slow" cx="400" cy="400" r="280" fill="url(#glowPulse)" />

    <!-- Cyber Circuit Lines (Futuristic AI Mesh) -->
    <g stroke="url(#cyberBlueGrad)" stroke-width="1.5" fill="none" opacity="0.4">
        <!-- Center connection lines -->
        <path class="circuit-path" d="M 150 400 L 250 400 L 320 330 L 320 250 L 400 210 L 480 250 L 480 330 L 550 400 L 650 400" />
        <path class="circuit-delay" d="M 200 480 L 300 480 L 350 530 L 450 530 L 500 480 L 600 480" />
        <path class="circuit-path" d="M 400 120 L 400 210" />
        <path class="circuit-delay" d="M 400 590 L 400 680" />
        
        <!-- Peripheral Nodes -->
        <circle cx="150" cy="400" r="4" fill="#00ffcc" />
        <circle cx="650" cy="400" r="4" fill="#00ffcc" />
        <circle cx="200" cy="480" r="3" fill="#0066ff" />
        <circle cx="600" cy="480" r="3" fill="#0066ff" />
        <circle cx="400" cy="120" r="5" fill="#00ffcc" filter="url(#glowSubtle)" />
        <circle cx="400" cy="680" r="5" fill="#00ffcc" filter="url(#glowSubtle)" />
    </g>

    <!-- Rotating Tech Rings -->
    <g class="rotate-clockwise">
        <!-- Outer Dashed Ring -->
        <circle cx="400" cy="400" r="290" fill="none" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="10 15" />
        <!-- Inner Tech Segment Rings -->
        <circle cx="400" cy="400" r="240" fill="none" stroke="url(#cyberBlueGrad)" stroke-width="3" stroke-opacity="0.6" stroke-dasharray="80 120 40 60" />
        <circle cx="400" cy="400" r="190" fill="none" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 8" />
    </g>

    <g class="rotate-counter">
        <!-- Counter Rotating Rings -->
        <circle cx="400" cy="400" r="265" fill="none" stroke="url(#neonGreenGrad)" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="100 80 50 120" />
        <circle cx="400" cy="400" r="215" fill="none" stroke="#0055ff" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="40 40" />
    </g>

    <!-- Glowing Cyber Shield Base (floating) -->
    <g class="float-slow">
        <!-- Shield Backdrop Glow -->
        <path d="M400 200 L560 260 V460 C560 580 400 670 400 670 C400 670 240 580 240 460 V260 Z" 
              fill="url(#shieldFill)" stroke="url(#cyberBlueGrad)" stroke-width="2.5" filter="url(#glow)" />

        <!-- Inner Grid within the Shield -->
        <path d="M400 200 L560 260 V460 C560 580 400 670 400 670 C400 670 240 580 240 460 V260 Z" 
              fill="url(#grid)" opacity="0.3" clip-path="url(#shieldClip)" />

        <!-- Neon Shield Border/Accents -->
        <path d="M400 215 L540 270 V450 C540 560 400 640 400 640 C400 640 260 560 260 450 V270 Z" 
              fill="none" stroke="url(#neonGreenGrad)" stroke-width="1.5" stroke-opacity="0.7" />

        <!-- Vertical Division -->
        <path d="M400 200 V670" stroke="url(#cyberBlueGrad)" stroke-width="1.5" stroke-opacity="0.4" />

        <!-- Central Secure Element: AI Brain/Core & Security Lock -->
        <g transform="translate(0, 0)">
            <!-- Outer Lock Ring -->
            <circle cx="400" cy="430" r="75" fill="#040d21" fill-opacity="0.85" stroke="url(#cyberBlueGrad)" stroke-width="2" />
            <circle class="dash-move" cx="400" cy="430" r="65" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0.6" />

            <!-- Cyber Lock Icon -->
            <!-- Lock Shackle -->
            <path d="M365 415 V385 C365 365 380 350 400 350 C420 350 435 365 435 385 V415" 
                  fill="none" stroke="url(#neonGreenGrad)" stroke-width="5.5" stroke-linecap="round" filter="url(#glowSubtle)" />
            <!-- Lock Body -->
            <rect x="350" y="410" width="100" height="70" rx="12" fill="url(#cyberBlueGrad)" stroke="#00ffcc" stroke-width="2.5" filter="url(#glowSubtle)" />
            <!-- Keyhole / AI Node -->
            <circle cx="400" cy="440" r="8" fill="#0c1020" stroke="#00ffcc" stroke-width="2" />
            <path d="M400 448 V465" stroke="#00ffcc" stroke-width="3" stroke-linecap="round" />
            
            <!-- Glow Dots inside Lock -->
            <circle cx="365" cy="425" r="3" fill="#00ffcc" />
            <circle cx="435" cy="425" r="3" fill="#00ffcc" />
        </g>

        <!-- Floating Security Shields (Mini) -->
        <g class="float-delay" transform="translate(490, 230) scale(0.4)">
            <path d="M100 30 L180 50 V110 C180 150 100 180 100 180 C100 180 20 150 20 110 V50 Z" 
                  fill="#031533" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
            <path d="M100 50 L80 90 H120 L100 130" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>

        <g class="float-slow" transform="translate(230, 520) scale(0.35)">
            <path d="M100 30 L180 50 V110 C180 150 100 180 100 180 C100 180 20 150 20 110 V50 Z" 
                  fill="#031533" stroke="#0066ff" stroke-width="4" filter="url(#glow)" />
            <circle cx="100" cy="100" r="25" fill="none" stroke="#0066ff" stroke-width="6" />
            <path d="M100 85 V115 M85 100 H115" stroke="#0066ff" stroke-width="6" stroke-linecap="round" />
        </g>
    </g>

    <!-- Threat Analysis Visuals (Radar scanner overlay) -->
    <g opacity="0.3" class="rotate-clockwise">
        <line x1="400" y1="400" x2="680" y2="200" stroke="#00ffcc" stroke-width="2" />
        <polygon points="400,400 680,200 650,150" fill="url(#cyberBlueGrad)" opacity="0.15" />
    </g>
</svg>
