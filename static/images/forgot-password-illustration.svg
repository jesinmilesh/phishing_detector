<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" fill="none">
    <defs>
        <!-- Gradients -->
        <radialGradient id="glowPulse" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.16" />
            <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="cyberBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="50%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>

        <linearGradient id="neonGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>

        <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowSubtle" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.08" />
        </pattern>
        <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#60A5FA" fill-opacity="0.1" />
        </pattern>
    </defs>

    <!-- CSS Animation Rules -->
    <style>
        .rotate-clockwise {
            transform-origin: 400px 400px;
            animation: rot-cw 45s linear infinite;
        }
        .rotate-counter {
            transform-origin: 400px 400px;
            animation: rot-ccw 35s linear infinite;
        }
        .pulse-slow {
            animation: pulse 5s ease-in-out infinite;
        }
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        .float-delay {
            animation: float 6s ease-in-out infinite;
            animation-delay: 3s;
        }
        .dash-move {
            stroke-dasharray: 8 16;
            animation: dash 18s linear infinite;
        }
        .pulse-ring {
            animation: ringExpand 4s ease-out infinite;
        }
        .key-float {
            animation: keyBounce 5s ease-in-out infinite;
        }

        @keyframes rot-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rot-ccw {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(0.96); transform-origin: 400px 400px; }
            50% { opacity: 0.5; transform: scale(1.04); transform-origin: 400px 400px; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes keyBounce {
            0%, 100% { transform: translateY(0px) rotate(-10deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        @keyframes dash {
            to { stroke-dashoffset: -400; }
        }
    </style>

    <!-- Background Grid patterns -->
    <rect width="800" height="800" fill="url(#grid)" />
    <rect width="800" height="800" fill="url(#dots)" />

    <!-- Ambient glow center backing -->
    <circle class="pulse-slow" cx="400" cy="400" r="300" fill="url(#glowPulse)" />

    <!-- Tech Ring Structures -->
    <g class="rotate-clockwise">
        <circle cx="400" cy="400" r="270" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="10 15" />
        <circle cx="400" cy="400" r="230" fill="none" stroke="url(#cyberBlueGrad)" stroke-width="2.5" stroke-opacity="0.4" stroke-dasharray="80 120 40 60" />
    </g>

    <g class="rotate-counter">
        <circle cx="400" cy="400" r="250" fill="none" stroke="url(#neonGreenGrad)" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="100 80 50 120" />
    </g>

    <!-- Connected Recovery Nodes -->
    <g stroke="url(#cyberBlueGrad)" stroke-width="1.5" opacity="0.4">
        <path d="M 150 400 L 260 400" />
        <path d="M 540 400 L 650 400" />
        <circle cx="150" cy="400" r="6" fill="#3B82F6" />
        <circle cx="650" cy="400" r="6" fill="#34D399" />
    </g>

    <!-- floating recovery graphics -->
    <g class="float-slow">
        <!-- Shield Backdrop transparent fill -->
        <path d="M400 200 L530 250 V420 C530 520 400 600 400 600 C400 600 270 520 270 420 V250 Z" 
              fill="#0F172A" fill-opacity="0.8" stroke="url(#cyberBlueGrad)" stroke-width="2.5" filter="url(#glow)" />

        <!-- Floating Lock Ring -->
        <circle cx="400" cy="380" r="60" fill="#0F172A" stroke="url(#cyberBlueGrad)" stroke-width="2" />
        <circle class="dash-move" cx="400" cy="380" r="50" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.7" />

        <!-- Biometric Recovery / Key Symbol -->
        <g class="key-float" transform="translate(400, 380)">
            <!-- Golden Cyber Key -->
            <circle cx="0" cy="0" r="16" fill="none" stroke="url(#amberGrad)" stroke-width="4.5" filter="url(#glowSubtle)" />
            <path d="M16 0 H42 M28 0 V12 M38 0 V12" stroke="url(#amberGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glowSubtle)" />
        </g>
    </g>
</svg>
