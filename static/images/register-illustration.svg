<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" fill="none">
    <defs>
        <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>
        <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22D3EE" />
            <stop offset="100%" stop-color="#0891B2" />
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#22C55E" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <style>
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        .pulse-slow {
            animation: pulse 4s ease-in-out infinite;
        }
        .rotate-cw {
            transform-origin: 400px 400px;
            animation: rot-cw 35s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }
        @keyframes rot-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Grid lines -->
    <g opacity="0.08">
        <path d="M 150 0 L 150 800 M 300 0 L 300 800 M 450 0 L 450 800 M 600 0 L 600 800" fill="none" stroke="#60A5FA" stroke-width="0.5" />
        <path d="M 0 150 L 800 150 M 0 300 L 800 300 M 0 450 L 800 450 M 0 600 L 800 600" fill="none" stroke="#60A5FA" stroke-width="0.5" />
    </g>

    <circle class="pulse-slow" cx="400" cy="400" r="300" fill="url(#centerGlow)" />

    <!-- Technical Circles -->
    <g class="rotate-cw" opacity="0.3">
        <circle cx="400" cy="400" r="260" stroke="url(#primaryGrad)" stroke-width="1.5" stroke-dasharray="15 30" />
        <circle cx="400" cy="400" r="210" stroke="url(#successGrad)" stroke-width="1" stroke-dasharray="100 80" />
    </g>

    <!-- Main Registration Shield Node -->
    <g class="float-slow">
        <!-- Identity Node Circle -->
        <circle cx="400" cy="400" r="110" fill="#1E293B" stroke="url(#primaryGrad)" stroke-width="2.5" filter="url(#glow)" />
        <circle cx="400" cy="400" r="95" fill="none" stroke="url(#cyanGrad)" stroke-width="1" stroke-dasharray="4 8" />

        <!-- User profile icon representation inside node -->
        <circle cx="400" cy="365" r="28" fill="none" stroke="url(#cyanGrad)" stroke-width="3" />
        <path d="M 350,430 C 350,405 370,395 400,395 C 430,395 450,405 450,430" fill="none" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round" />

        <!-- Green Success Shield Overlay badge -->
        <g transform="translate(470, 430)">
            <path d="M 30,0 L 55,10 V 45 C 55,65 30,80 30,80 C 30,80 5,65 5,45 V 10 Z" fill="#1E293B" stroke="url(#successGrad)" stroke-width="2" filter="url(#glow)" />
            <!-- Checkmark -->
            <path d="M 18,40 L 26,48 L 42,32" fill="none" stroke="url(#successGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        </g>
        
        <!-- Connecting secure identity lines to database nodes -->
        <g opacity="0.7">
            <line x1="290" y1="400" x2="180" y2="400" stroke="url(#primaryGrad)" stroke-width="1.5" />
            <line x1="510" y1="400" x2="620" y2="400" stroke="url(#primaryGrad)" stroke-width="1.5" />
            
            <circle cx="180" cy="400" r="8" fill="url(#cyanGrad)" />
            <circle cx="620" cy="400" r="8" fill="url(#cyanGrad)" />
        </g>
    </g>
</svg>
